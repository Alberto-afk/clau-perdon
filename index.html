<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>¿Me perdonas?</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="image-container">
            <img id="dogImg" src="perro-triste.png" alt="Perrito triste">
        </div>
        <div id="mainText">¿me perdonas? 🥺</div>
        
        <div class="buttons">
            <!-- Yes is smaller initially -->
            <button id="yesBtn">Sí me perdonas</button>
            <!-- No is bigger and more flashy initially -->
            <button id="noBtn">No estoy molesta 😠</button>
        </div>
        
        <div id="finalMessage" class="hidden">¡Sabía que me perdonarías! 😊</div>
    </div>
    
    <audio id="audio" src="minimax.mp3"></audio>
    <script src="script.js"></script>
</body>
</html>
